<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>messages</title>
</head>
<body>

<div id="app"></div>

<script src="config.js"></script>
<script src="messages.js"></script>

<script>
const storedPerson = localStorage.getItem("person");

Elm.Messages.init({
    node: document.getElementById("app"),
    flags: {
        apiUrl: window.APP_CONFIG.apiUrl,
        person: storedPerson
    }
});
</script>

</body>
</html>
